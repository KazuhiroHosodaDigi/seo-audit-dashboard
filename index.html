<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Monitoring Dashboard - Digimarl</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --text-primary: #0b0b0b;
      --text-secondary: #52514e;
      --text-success: #0ca30c;
      --text-danger: #d03b3b;
      --surface-0: #fcfcfb;
      --surface-1: #f5f4f1;
      --surface-2: #ffffff;
      --border: rgba(11, 11, 11, 0.1);
      --border-strong: rgba(11, 11, 11, 0.2);
      --fill-accent: #2a78d6;
      --on-accent: #ffffff;
      --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-success: #66d946;
        --text-danger: #ff6b6b;
        --surface-0: #0f0f0e;
        --surface-1: #1a1a19;
        --surface-2: #2c2c2a;
        --border: rgba(255, 255, 255, 0.1);
        --border-strong: rgba(255, 255, 255, 0.2);
      }
    }
    body {
      background: var(--surface-0);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
    .header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; }
    .header h1 { font-size: 26px; font-weight: 500; margin-bottom: 0.25rem; }
    .header p { font-size: 14px; color: var(--text-secondary); }
    .refresh-info { font-size: 12px; color: var(--text-secondary); text-align: right; }
    button {
      padding: 8px 16px; border-radius: var(--radius); font-size: 14px;
      cursor: pointer; font-weight: 500; background: var(--fill-accent);
      color: var(--on-accent); border: none;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .metrics-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 2rem;
    }
    .metric-card { background: var(--surface-1); padding: 1rem; border-radius: 12px; }
    .metric-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .metric-value { font-size: 26px; font-weight: 500; }
    .charts-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem; margin-bottom: 1.5rem;
    }
    .card {
      background: var(--surface-2); padding: 1.25rem;
      border: 0.5px solid var(--border); border-radius: 12px;
    }
    .card h3 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
    .chart-container { position: relative; width: 100%; height: 280px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px; color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border); }
    td { padding: 8px; border-bottom: 1px solid var(--border); }
    tr:hover { background: var(--surface-1); }
    .loading, .error { text-align: center; padding: 3rem; color: var(--text-secondary); }
    .error { color: var(--text-danger); }
    #dashboard { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>SEO Monitoring Dashboard</h1>
        <p>Digimarl.com — Search Console データ</p>
      </div>
      <div>
        <button id="refreshBtn" onclick="loadAll()">更新</button>
        <div class="refresh-info" id="lastUpdated"></div>
      </div>
    </div>

    <div id="loadingState" class="loading">データを読み込み中...</div>
    <div id="errorState" class="error" style="display:none;"></div>

    <div id="dashboard">
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">直近28日クリック数</div>
          <div class="metric-value" id="totalClicks">—</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">直近28日表示回数</div>
          <div class="metric-value" id="totalImpressions">—</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">平均CTR</div>
          <div class="metric-value" id="avgCtr">—</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">平均掲載順位</div>
          <div class="metric-value" id="avgPosition">—</div>
        </div>
      </div>

      <div class="charts-grid">
        <div class="card">
          <h3>クリック数の推移</h3>
          <div class="chart-container"><canvas id="clicksChart"></canvas></div>
        </div>
        <div class="card">
          <h3>掲載順位の推移（低いほど上位）</h3>
          <div class="chart-container"><canvas id="positionChart"></canvas></div>
        </div>
      </div>

      <div class="charts-grid">
        <div class="card">
          <h3>デバイス別クリック数（直近28日）</h3>
          <div class="chart-container"><canvas id="deviceChart"></canvas></div>
        </div>
        <div class="card">
          <h3>検索クエリ上位（直近28日）</h3>
          <div style="max-height: 280px; overflow-y: auto;">
            <table>
              <thead>
                <tr><th>クエリ</th><th>クリック</th><th>表示</th><th>CTR</th><th>順位</th></tr>
              </thead>
              <tbody id="queriesTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const charts = {};

    async function fetchJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`${url} failed: ${res.status}`);
      return res.json();
    }

    async function loadAll() {
      document.getElementById('refreshBtn').disabled = true;
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('errorState').style.display = 'none';
      document.getElementById('dashboard').style.display = 'none';

      try {
        const [daily, queries, devices] = await Promise.all([
          fetchJSON('/api/daily-summary'),
          fetchJSON('/api/top-queries'),
          fetchJSON('/api/device-breakdown')
        ]);

        renderSummary(daily);
        renderClicksChart(daily);
        renderPositionChart(daily);
        renderDeviceChart(devices);
        renderQueriesTable(queries);

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('lastUpdated').textContent =
          '最終更新: ' + new Date().toLocaleString('ja-JP');
      } catch (err) {
        console.error(err);
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
        document.getElementById('errorState').textContent =
          'データの取得に失敗しました: ' + err.message;
      } finally {
        document.getElementById('refreshBtn').disabled = false;
      }
    }

    function renderSummary(daily) {
      const last28 = daily.slice(-28);
      const clicks = last28.reduce((s, d) => s + (d.clicks || 0), 0);
      const impressions = last28.reduce((s, d) => s + (d.impressions || 0), 0);
      const ctr = impressions > 0 ? (clicks / impressions * 100) : 0;
      const avgPos = last28.reduce((s, d) => s + (d.avg_position || 0), 0) / (last28.length || 1);

      document.getElementById('totalClicks').textContent = clicks.toLocaleString();
      document.getElementById('totalImpressions').textContent = impressions.toLocaleString();
      document.getElementById('avgCtr').textContent = ctr.toFixed(2) + '%';
      document.getElementById('avgPosition').textContent = avgPos.toFixed(1);
    }

    function renderClicksChart(daily) {
      const ctx = document.getElementById('clicksChart').getContext('2d');
      if (charts.clicks) charts.clicks.destroy();
      charts.clicks = new Chart(ctx, {
        type: 'line',
        data: {
          labels: daily.map(d => d.date.value || d.date),
          datasets: [{
            label: 'クリック数',
            data: daily.map(d => d.clicks),
            borderColor: '#2a78d6',
            backgroundColor: 'rgba(42,120,214,0.1)',
            borderWidth: 2, fill: true, pointRadius: 0, tension: 0.3
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    }

    function renderPositionChart(daily) {
      const ctx = document.getElementById('positionChart').getContext('2d');
      if (charts.position) charts.position.destroy();
      charts.position = new Chart(ctx, {
        type: 'line',
        data: {
          labels: daily.map(d => d.date.value || d.date),
          datasets: [{
            label: '平均掲載順位',
            data: daily.map(d => d.avg_position),
            borderColor: '#eb6834',
            backgroundColor: 'rgba(235,104,52,0.1)',
            borderWidth: 2, fill: true, pointRadius: 0, tension: 0.3
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { reverse: true } }
        }
      });
    }

    function renderDeviceChart(devices) {
      const ctx = document.getElementById('deviceChart').getContext('2d');
      if (charts.device) charts.device.destroy();
      charts.device = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: devices.map(d => d.device),
          datasets: [{
            data: devices.map(d => d.clicks),
            backgroundColor: ['#2a78d6', '#eb6834', '#1baf7a']
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    function renderQueriesTable(queries) {
      const html = queries.map(q => `
        <tr>
          <td>${q.query}</td>
          <td>${q.clicks}</td>
          <td>${q.impressions}</td>
          <td>${(q.ctr * 100).toFixed(1)}%</td>
          <td>${q.avg_position.toFixed(1)}</td>
        </tr>
      `).join('');
      document.getElementById('queriesTableBody').innerHTML = html;
    }

    loadAll();
  </script>
</body>
</html>
